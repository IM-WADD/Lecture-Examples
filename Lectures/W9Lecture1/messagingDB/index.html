<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Messages</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <p><em>Hello, AUser!</em></p>
        </header>
        <main>
            <h1>UserB</h1>
            <div id="messages-container">
                <div class="message incoming">
                    <div class="message-content">
                        <p class="message-text">This is a message from UserB!</p>
                        <span class="message-time">15:00</span>
                    </div>
                </div>
                <div class="message outgoing">
                    <div class="message-content">
                        <p class="message-text">This is a reply!</p>
                        <span class="message-time">15:02</span>
                    </div>
                </div>
            </div>
            <div id="message-input">
                <input type="text" placeholder="Type a message..." id="new-message">
                <button id="send-button">Send</button>
            </div>
        </main>
        <script src="main.js"></script>
    </body>
</html>
